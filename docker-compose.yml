services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hueshow_app
    working_dir: /var/www/html
    environment:
      DB_HOST: turntable.proxy.rlwy.net
      DB_PORT: 35024
      DB_USER: root
      DB_PASS: dobWChJGMbqjcZEzoZKqNJkrcdCowloF
      DB_NAME: railway
      DB_CHARSET: utf8mb4
    volumes:
      - ./:/var/www/html
    networks:
      - hueshow_net

  web:
    image: nginx:1.27-alpine
    container_name: hueshow_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - hueshow_net

networks:
  hueshow_net:
    driver: bridge